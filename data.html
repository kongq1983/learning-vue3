<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Data 示例</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <a href="./index.html">返回示例目录</a>

    <div id="app">
        <h3>{{ title }}</h3>
    </div>

    <script>
       const { createApp, ref } = Vue;
       createApp({
        setup() {
            const title = ref('这是 Vue 图标');
            return { title }
        }
       }).mount('#app');
    </script>
</body>
</html>

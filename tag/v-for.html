<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>v-for 列表渲染示例</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px;line-height:1.6}
    .box{max-width:760px}
    .panel{border:1px dashed #cbd5e1;border-radius:10px;padding:14px;margin:12px 0}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
    input{padding:6px 8px}
    button{padding:6px 10px}
    .list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
    .item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0}
    .done{text-decoration:line-through;color:#94a3b8}
    .muted{color:#64748b;font-size:14px}
    .kv{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
    .tag{display:inline-block;padding:2px 6px;border-radius:999px;background:#e2f7ef;color:#14785b;font-size:12px;margin-right:6px}
    .stars{font-size:20px}
  </style>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <a href="../index.html">返回示例目录</a>
  <div id="app" class="box">
    <h1>v-for：列表与对象渲染</h1>

    <section class="panel">
      <h3>1. 数组列表（带索引与 key）</h3>
      <div class="toolbar">
        <input v-model.trim="newItem" placeholder="输入待办事项">
        <button @click="addItem">添加</button>
        <button @click="shuffle">乱序</button>
      </div>
      <p class="muted">总数 {{ items.length }}，未完成 {{ remaining }}</p>

      <ul class="list">
        <li v-for="(item, index) in items" :key="item.id" class="item">
          <label>
            <input type="checkbox" v-model="item.done">
            <span :class="{ done: item.done }">{{ index + 1 }}. {{ item.text }}</span>
          </label>
          <button @click="removeItem(item.id)">删除</button>
        </li>
      </ul>
      <p v-if="!items.length" class="muted">暂无数据</p>
    </section>

    <section class="panel">
      <h3>2. 渲染对象</h3>
      <ul class="kv">
        <li v-for="(value, key, index) in profile" :key="key">
          <span class="tag">#{{ index + 1 }}</span>
          <strong>{{ key }}</strong>：{{ value }}
        </li>
      </ul>
    </section>

    <section class="panel">
      <h3>3. 数字范围</h3>
      <div class="stars">
        <span v-for="n in 5" :key="n">⭐</span>
      </div>
    </section>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          newItem: '',
          nextId: 4,
          items: [
            { id: 1, text: '阅读 Vue 文档', done: false },
            { id: 2, text: '练习 v-for', done: true },
            { id: 3, text: '整理学习笔记', done: false }
          ],
          profile: {
            姓名: '小凡',
            城市: '杭州',
            兴趣: '摄影 / 徒步'
          }
        };
      },
      computed: {
        remaining() {
          return this.items.filter(item => !item.done).length;
        }
      },
      methods: {
        addItem() {
          if (!this.newItem) return;
          this.items.push({ id: this.nextId++, text: this.newItem, done: false });
          this.newItem = '';
        },
        removeItem(id) {
          this.items = this.items.filter(item => item.id !== id);
        },
        shuffle() {
          this.items = [...this.items].sort(() => Math.random() - 0.5);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>

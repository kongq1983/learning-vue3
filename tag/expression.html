<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>v-html 指令示例</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <a href="../index.html">返回示例目录</a>

  <div id="app">
    邮箱地址: {{ email }} <br>
    QQ号码: {{ email.substring(0, email.indexOf('@')) }}
  </div>

<script>
  const { createApp, ref } = Vue

  createApp({
    setup() {
      const email = ref('1234567890@qq.com')
      return { email }
    }
  }).mount('#app')
</script>

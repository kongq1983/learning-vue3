<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>v-html 指令示例</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <a href="../index.html">返回示例目录</a>

  <div id="app"><p v-html="message"></p></div>

<script>
  const { createApp, ref } = Vue

  createApp({
    setup() {
      const message = ref('<h1 style="color: blue;">Hello vue!</h1>')
      return {
        message
      }
    }
  }).mount('#app')
</script>

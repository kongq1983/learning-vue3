<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
<title>输出成绩表</title>
<style>
body{text-align:center;
font-family:微软雅黑}
label{
margin-left:20px;}
.report{width:560px;
margin:30px auto;}
.title{
background: #f6f6f6;
font-size:18px;
}
.title,.content{
width:560px;
height:36px;
line-height:36px;
border: 1px solid blue;}
.title div{
width:80px;
text-align:center;
float:left}
.content{
clear:both;
	border-top: none;
	color: green;}
.content div{
width:80px;
text-align:center;
float:left}
</style>
</head>
<body>
	<a href="/index.html">返回示例目录</a>
<div id="app">
	<h2>成绩表</h2>
	<label>姓名：</label><span>{{name}}</span>
	<label>性别：</label><span>{{sex}}</span>
	<label>年龄：</label><span>{{age}}</span>
	<div class="report">
		<div class="title">
			<div>学期</div>
			<div>语文</div>
			<div>数学</div>
			<div>外语</div>
			<div>物理</div>
			<div>化学</div>
			<div>总分</div>
		</div>
		<div class="content" v-for="(grade,index) in grades">
			<div>{{grade.term}}</div>
			<div v-for="score in grade.scores">
				<div>{{score}}</div>
			</div>
			<div>{{total(index)}}</div>
		</div>
	</div>
</div>
<script src="https://unpkg.com/vue@3"></script>
<script type="text/javascript">
	const vm = Vue.createApp({
		data(){
			return {
				name : '张大',//姓名
				sex : '男',//性别
				age : 18,//年龄
				grades : [{//学期和考试成绩
					term : '第一学期',
					scores : {
						chinese : 91,
						math : 95,
						english : 92,
						physics : 98,
						chemistry : 96
					}
				},{
					term : '第二学期',
					scores : {
						chinese : 90,
						math : 98,
						english : 97,
						physics : 96,
						chemistry : 95
					}
				}]
			}
		},
		methods : {
			total : function(index){
				var total = 0;//定义总分
				var obj = this.grades[index].scores;//获取分数对象
				for(var i in obj){
					total += obj[i];
				}
				return total;//返回总分
			}
		}
	}).mount('#app');
</script>


</body>

</html>
